name: publish

# Tokenless dual publish via OIDC trusted publishing.
# - npm:  requires the package's Trusted Publisher to be configured on npmjs.com
#         (only possible after the first publish exists — bootstrapped locally).
# - PyPI: uses the pending/trusted publisher already registered, gated on the
#         `pypi` GitHub environment.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      # The authority-event verify tests exercise a REAL Ed25519 signature; the
      # crypto proof (valid verifies / forgery rejects) must actually run, never
      # silently skip. Install the `authority` extra so it runs for real.
      - run: python -m pip install cryptography
      - run: npm test
      - run: python -m unittest discover -s tests -p 'test_*.py'

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm OIDC trusted publishing (no NODE_AUTH_TOKEN)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"   # npm@latest requires node ^22.22.2 || ^24.15.0 (22.14.0 EBADENGINEs)
          registry-url: "https://registry.npmjs.org"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: npm install -g npm@latest   # ensure an OIDC-capable npm (>= 11.5)
      - run: npm test
      - run: npm publish

  publish-pypi:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI OIDC trusted publishing (no API token)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m pip install cryptography
      - run: python -m unittest discover -s tests -p 'test_*.py'
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # idempotent: a re-dispatch after a partial publish won't fail on an already-live version
